<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PROJECT_NAME}}</title>

  <!-- SEO：根据项目实际情况替换以下占位符 -->
  <meta name="description" content="{{SEO_DESCRIPTION}}">
  <meta name="keywords" content="{{SEO_KEYWORDS}}">
  <meta name="author" content="{{SEO_AUTHOR}}">
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{PROJECT_NAME}}">
  <meta property="og:description" content="{{SEO_DESCRIPTION}}">
  <meta property="og:site_name" content="{{PROJECT_NAME}}">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{PROJECT_NAME}}">
  <meta name="twitter:description" content="{{SEO_DESCRIPTION}}">

  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <style>
    :root {
      --theme-color: #42b983;
      --theme-color-dark: #2d8c5c;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif; }
    h1 { color: var(--theme-color); border-bottom: 2px solid var(--theme-color); padding-bottom: 10px; }
    h2 { border-bottom: 1px solid #e4e7ed; padding-bottom: 8px; }
    code { background: rgba(66,185,131,.1); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
    pre code { background: #f8f9fa; padding: 0; }
    .mermaid { text-align: center; margin: 20px 0; }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/themes/vue.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '{{PROJECT_NAME}}',
      nameLink: '/',
      loadSidebar: '_sidebar.md',
      subMaxLevel: 4,
      search: { paths: 'auto', placeholder: '搜索...', noData: '无结果' },
      pagination: { previousText: '上一章节', nextText: '下一章节', crossChapter: true },
      mermaid: { theme: 'default' },
      copyCode: { buttonText: '复制', errorText: '失败', successText: '已复制' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@2.0.1/dist/docsify-mermaid.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: true, theme: 'default', flowchart: { useMaxWidth: true } });
  </script>
  <!-- Prism.js 语法高亮：根据项目语言取消注释对应行，或添加新语言 -->
  <!-- <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script> -->
  <!-- <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-go.min.js"></script> -->
  <!-- <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script> -->
  <!-- <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-php.min.js"></script> -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
